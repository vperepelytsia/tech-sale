<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <title>Продаж офісної техніки</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>Продаж офісної техніки</h1>
<p class="note">
  Тільки для співробітників. Стан «як є». Без гарантії.
</p>

<div id="catalog" class="grid"></div>

<!-- Lightbox -->
<div id="lightbox" class="lightbox" onclick="closeLightbox()">
  <img id="lightbox-img">
</div>

<script>
fetch('https://raw.githubusercontent.com/vperepelytsia/tech-sale/main/data.json')
  .then(r => r.json())
  .then(items => {
    const catalog = document.getElementById('catalog');

    items.forEach(item => {
      const card = document.createElement('div');
      card.className = 'card';

      const photos = item.photos.map(p =>
        `<img src="${p}" onclick="openLightbox('${p}')">`
      ).join('');

      const features = item.features
        ? `<ul class="features">
            ${item.features.map(f => `<li>${f}</li>`).join('')}
           </ul>`
        : '';

      const button = item.status === 'available'
        ? `<a class="btn" href="${item.formLink}" target="_blank">Зарезервувати</a>`
        : '';

      card.innerHTML = `
        <div class="photos">${photos}</div>
        <h3>${item.name}</h3>
        <p>${item.specs}</p>
        ${features}
        <p class="defects">${item.defects}</p>
        <p class="price">${item.price}</p>
        <span class="status ${item.status}">
          ${item.status === 'available' ? 'В наявності' : 'Зарезервовано'}
        </span>
        ${button}
      `;

      catalog.appendChild(card);
    });
  });

function openLightbox(src) {
  document.getElementById('lightbox-img').src = src;
  document.getElementById('lightbox').classList.add('active');
}

function closeLightbox() {
  document.getElementById('lightbox').classList.remove('active');
}
</script>

</body>
</html>
